<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мартын 8 - Мэндчилгээ</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:"Segoe UI",sans-serif;
background:linear-gradient(135deg,#ff7eb3,#ffb6d9,#ffe3f3);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.container{
position:relative;
text-align:center;
max-width:420px;
width:92%;
}

.card{
background:rgba(255,255,255,0.9);
padding:25px;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,0.2);
backdrop-filter:blur(10px);
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(30px)}
to{opacity:1; transform:translateY(0)}
}

h1{
margin-top:10px;
font-size:30px;
color:#ff2e8a;
}

.subtitle{
color:#555;
margin-bottom:15px;
}

.photo{
width:100%;
border-radius:18px;
margin-bottom:15px;
box-shadow:0 15px 30px rgba(0,0,0,0.25);
}

.message{
display:none;
margin-top:15px;
font-size:20px;
color:#d81b60;
animation:fadeIn 1s ease;
}

button{
padding:12px 28px;
border:none;
border-radius:30px;
font-size:16px;
background:linear-gradient(90deg,#ff2e8a,#ff6ab5);
color:white;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
transition:0.3s;
}

button:hover{
transform:scale(1.08);
}

/* 3D HEART */
.heart{
width:70px;
height:70px;
background:#ff2e8a;
position:relative;
margin:20px auto;
transform:rotate(-45deg);
animation:beat 1s infinite;
}

.heart:before,
.heart:after{
content:"";
width:70px;
height:70px;
background:#ff2e8a;
border-radius:50%;
position:absolute;
}

.heart:before{top:-35px;left:0}
.heart:after{left:35px;top:0}

@keyframes beat{
0%{transform:rotate(-45deg) scale(1)}
50%{transform:rotate(-45deg) scale(1.2)}
100%{transform:rotate(-45deg) scale(1)}
}

/* falling flowers */
.flower{
position:absolute;
top:-50px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px) rotate(0deg);opacity:1}
100%{transform:translateY(110vh) rotate(360deg);opacity:0.8}
}

/* floating hearts */
.smallHeart{
position:absolute;
font-size:18px;
animation:floatUp 6s linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-120vh);opacity:0}
}

.footer{
margin-top:15px;
font-size:13px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<img src="photo.jpg" class="photo">

<h1>Мартын 8</h1>

<div class="subtitle">Олон улсын эмэгтэйчүүдийн баярын мэнд хүргэе</div>

<div class="heart"></div>

<button onclick="showMessage()">Мэндчилгээ нээх</button>

<div id="msg" class="message">
Танд аз жаргал, инээд хөөр, хайр дүүрэн сайхан өдрүүдийг хүсье 💖🌷
</div>

<div class="footer">With Love ❤️</div>

</div>
</div>

<script>

function showMessage(){
 document.getElementById("msg").style.display="block";
}

// flowers
for(let i=0;i<30;i++){
 let flower=document.createElement("div");
 flower.className="flower";
 flower.innerHTML="🌸";
 flower.style.left=Math.random()*100+"vw";
 flower.style.fontSize=(18+Math.random()*20)+"px";
 flower.style.animationDuration=(4+Math.random()*6)+"s";
 document.body.appendChild(flower);
}

// floating hearts
for(let i=0;i<20;i++){
 let heart=document.createElement("div");
 heart.className="smallHeart";
 heart.innerHTML="💖";
 heart.style.left=Math.random()*100+"vw";
 heart.style.bottom="-20px";
 heart.style.animationDuration=(4+Math.random()*4)+"s";
 document.body.appendChild(heart);
}

</script>

</body>
</html>
